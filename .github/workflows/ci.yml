name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check app/ mcp_server/ tests/

      - name: Format check with ruff
        run: ruff format --check app/ mcp_server/ tests/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reviewflow
          POSTGRES_PASSWORD: reviewflow
          POSTGRES_DB: reviewflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reviewflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://reviewflow:reviewflow@localhost:5432/reviewflow_test
          JWT_SECRET_KEY: test-secret
          OPENAI_API_KEY: sk-test
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports
